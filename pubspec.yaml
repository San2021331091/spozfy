name: spozfy
description: "A live sports app written in Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  google_fonts: ^8.1.0
  get: ^4.7.3
  flutter_dotenv: ^6.0.1
  intl: ^0.20.2
  video_player: ^2.11.1
  flutter_local_notifications: ^21.0.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  startapp_sdk: ^1.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"